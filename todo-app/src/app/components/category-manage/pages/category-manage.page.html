<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Categories</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openCategoryModal()">Add</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Categories</ion-title>
    </ion-toolbar>
  </ion-header>

  @if (categories.length === 0) {
    <ion-text color="medium" class="empty-state">
      <p>No categories yet.</p>
    </ion-text>
  } @else {
    <ion-list>
      <ion-virtual-scroll [items]="categories" itemHeight="72px">
        <ng-template let-category>
          <ion-item-sliding>
            <ion-item>
              <ion-label>
                <h2>{{ category.name }}</h2>
                <p>{{ tasks | categoryTaskCount:category.id }} associated task(s)</p>
              </ion-label>
              <ion-button fill="clear" slot="end" (click)="openCategoryModal(category)">Edit</ion-button>
            </ion-item>
            <ion-item-options side="end">
              <ion-item-option color="danger" (click)="confirmDelete(category)">Delete</ion-item-option>
            </ion-item-options>
          </ion-item-sliding>
        </ng-template>
      </ion-virtual-scroll>
    </ion-list>
  }
</ion-content>
