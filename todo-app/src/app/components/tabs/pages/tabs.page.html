<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="tasks" href="/tabs/tasks">
      <ion-icon aria-hidden="true" name="checkbox-outline"></ion-icon>
      <ion-label>Tasks</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="categories" href="/tabs/categories">
      <ion-icon aria-hidden="true" name="albums-outline"></ion-icon>
      <ion-label>Categories</ion-label>
    </ion-tab-button>

    @if (showStats$ | async) {
      <ion-tab-button tab="statistics" href="/tabs/statistics">
        <ion-icon aria-hidden="true" name="bar-chart-outline"></ion-icon>
        <ion-label>Statistics</ion-label>
      </ion-tab-button>
    }
  </ion-tab-bar>
</ion-tabs>
