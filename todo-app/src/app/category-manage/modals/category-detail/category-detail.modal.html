<ion-header>
  <ion-toolbar>
    <ion-title>{{ category ? 'Edit category' : 'New category' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="save()">
    <ion-list>
      <ion-item>
        <ion-input label="Name" labelPlacement="stacked" formControlName="name"></ion-input>
      </ion-item>
      @if (form.controls.name.touched && form.controls.name.invalid) {
        <ion-note color="danger">Name is required.</ion-note>
      }
    </ion-list>

    <ion-button expand="block" type="submit" class="ion-margin-top">Save</ion-button>
  </form>
</ion-content>
