<cdk-virtual-scroll-viewport
  class="virtual-scroll-list"
  [itemSize]="itemSize"
  [style.height]="maxHeight"
>
  <div
    *cdkVirtualFor="let item of items; let index = index; trackBy: trackByIndex"
    class="virtual-scroll-item"
    [style.min-height]="itemHeight"
  >
    <ng-container
      *ngTemplateOutlet="itemTemplate || null; context: { $implicit: item, item: item, index: index }"
    ></ng-container>
  </div>
</cdk-virtual-scroll-viewport>
